version: '3.8'

services:
  backend:
    build: .
    working_dir: /app
    environment:
      - PYTHONPATH=/app
    command: uvicorn backend.app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file: 
      - .env

  frontend:
    build: .
    working_dir: /app
    environment:
      - PYTHONPATH=/app
    command: streamlit run frontend/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - backend